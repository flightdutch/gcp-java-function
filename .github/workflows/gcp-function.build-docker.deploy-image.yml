name: Java CI/CD to GCP Cloud Run (Docker Way)

on:
  push:
    branches: [ "test", "develop", "uat", "main" ]

env:
  PROJECT_ID: new-best-analyzer
  REGION: europe-west3
  WORKSPACE: "test"
  IMAGE_NAME: java-run-function

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ env.WORKSPACE }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Збираємо стандартний Java JAR файл локально на ранері GitHub
    - name: Build with Gradle
      run: ./gradlew clean build -x test # за потреби приберіть -x test, якщо є тести

    # 2. Авторизація в Google Cloud за допомогою вашого Universal SA
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 3. Авторизація Docker-клієнта у вашому регіональному Artifact Registry
    - name: Docker Auth to GCP
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # 4. Збірка образу з правильним тегом вашого ТФ-репозиторію
    # Шаблон: functions-${{ env.WORKSPACE }} - functions-${{ github.ref_name }} автоматично перетвориться на functions-test, functions-develop і т.д. автоматично перетвориться на functions-test, functions-develop і т.д.
    - name: Build and Tag Docker Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/functions-${{ env.WORKSPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    # 5. Пуш готового контейнера у ваш легітимний репозиторій
    - name: Push Docker Image to Artifact Registry
      run: |
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/functions-${{ env.WORKSPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 6. Деплой готового контейнера безпосередньо в Cloud Run (минаючи Cloud Build хмари)
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.IMAGE_NAME }} \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/functions-${{ env.WORKSPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region=${{ env.REGION }} \
          --service-account=${{ secrets.UNIVERSAL_SA_EMAIL }} \
          --allow-unauthenticated \
          --port=8080
