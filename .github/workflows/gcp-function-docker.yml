name: Java CI/CD to GCP Artifact Registry

on:
  push:
    branches: [ "main", "master" ]

env:
  PROJECT_ID: new-best-analyzer
  REGION: europe-west3
  REPOSITORY: analyzer-docker-repo # Name of your Artifact Registry repository
  IMAGE_NAME: java-run-function

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Assuming you might use your environment layout
    environment: ${{ github.ref_name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Build the JAR file locally
    - name: Build with Gradle
      run: ./gradlew clean build

    # 6. Upload the generated JAR file as a GitHub artifact
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-jar                      # Name of the artifact download
        path: build/libs/*.jar                  # Path to the compiled JAR file(s)
        retention-days: 5                       # Optional: How long to keep the artifact (in days)

    # 2. Authenticate to Google Cloud using your Universal SA
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 3. Authenticate Docker client to GCP Artifact Registry
    - name: Docker Auth to GCP
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # 4. Build and Tag the Docker Image
    - name: Build and Tag Docker Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

    # 5. Push the Image to GCP Artifact Registry
    - name: Push Docker Image
      run: |
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

    # 6. Deploy to Cloud Run Functions pointing directly to the Docker Image
    - name: Deploy to Cloud Run Functions
      run: |
        gcloud functions deploy ${{ env.IMAGE_NAME }} \
          --gen2 \
          --region=${{ env.REGION }} \
          --entry-point=com.example.App \
          --trigger-http \
          --allow-unauthenticated \
          --docker-image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --service-account=${{ secrets.UNIVERSAL_SA_EMAIL }}
