name: Java CI/CD to GCP Artifact Registry

on:
  push:
    branches: [ "test", "develop", "uat", "main" ]

env:
  PROJECT_ID: new-best-analyzer
  REGION: europe-west3
  IMAGE_NAME: java-run-function

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # Деплоїмо той самий образ, який успішно піднявся у вас локально
    - name: Deploy Verified Google Hello Image
      run: |
        gcloud run deploy ${{ env.IMAGE_NAME }} \
          --image=gcr.io/cloudrun/hello:latest \
          --region=${{ env.REGION }} \
          --service-account=${{ secrets.UNIVERSAL_SA_EMAIL }} \
          --allow-unauthenticated
