name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code onto the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the Java Development Kit (JDK)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Set up Gradle environment and enable caching for faster builds
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. Grant execute permission for the Gradle Wrapper script
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. Compile and build the project (generates JAR file in build/libs/)
    - name: Build with Gradle
      run: ./gradlew build

    # 6. Upload the generated JAR file as a GitHub artifact
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-jar                      # Name of the artifact download
        path: build/libs/*.jar                  # Path to the compiled JAR file(s)
        retention-days: 5                       # Optional: How long to keep the artifact (in days)
